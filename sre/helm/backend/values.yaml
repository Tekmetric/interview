# =============================================================================
# Default values for Tekmetric backend service
# =============================================================================

replicaCount: 2

image:
  repository: tekmetric-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/actuator/prometheus"
  prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

# -----------------------------------------------------------------------------
# Resource management
# -----------------------------------------------------------------------------
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Health Probes (using Spring Boot Actuator)
# Note: Spring Boot 2.2.x uses /actuator/health (liveness/readiness added in 2.3+)
# -----------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# -----------------------------------------------------------------------------
# Horizontal pod autoscaler
# -----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 80

# -----------------------------------------------------------------------------
# Pod disruption budget
# -----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Alternative to minAvailable

# -----------------------------------------------------------------------------
# Node selection and affinity
# -----------------------------------------------------------------------------
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - backend
          topologyKey: topology.kubernetes.io/zone

# -----------------------------------------------------------------------------
# Application configuration (via ConfigMap)
# -----------------------------------------------------------------------------
config:
  spring:
    profiles:
      active: "default"
  server:
    port: 8080
  logging:
    level:
      root: INFO
      com.interview: DEBUG

# -----------------------------------------------------------------------------
# Additional environment variables
# -----------------------------------------------------------------------------
env: []
  # - name: JAVA_OPTS
  #   value: "-Xmx384m -Xms256m"

# -----------------------------------------------------------------------------
# Network policy
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false  # Enable to restrict pod network access
  denyEgress: false  # Also restrict outbound traffic
  allowedCIDRs: []  # Restrict ingress to specific CIDRs (empty = allow all)

# -----------------------------------------------------------------------------
# Additional volumes (for read-only rootfs)
# -----------------------------------------------------------------------------
extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
