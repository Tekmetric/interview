# TODO(prod): Move datasource credentials to a secret manager and use a managed external DB (Postgresql/Mysql/Oracle).
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.flyway.locations=classpath:db/migration
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics
# TODO(prod): Restrict actuator exposure to private network and split readiness/liveness health groups.
management.endpoint.health.show-details=never
