management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: database/migrations
  jpa:
    database-platform.org:
      hibernate:
        dialect:
          H2Dialect: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format-sql: true
minio:
  endpoint: http://localhost:9000
  username: minioadmin
  password: minioadmin
  bucket: tek-bucket
  presignedUrlExpireAfterMinutes: 10
