name: CI

# Manual-only trigger to avoid running on upstream repos (e.g. interview forks).
# Uncomment the push/pull_request triggers below to enable automatic CI.
on:
  workflow_dispatch:
  # push:
  #   branches: [master, feature/**]
  # pull_request:
  #   branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Unit tests
        run: mvn test

      - name: Integration tests
        run: mvn verify -Dsurefire.skip=true

      - name: Build Docker image (CNB)
        run: mvn spring-boot:build-image -DskipTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
