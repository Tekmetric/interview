---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-ui
  labels:
    app: interview-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-ui
  template:
    metadata:
      labels:
        app: interview-ui
    spec:
      imagePullSecrets:
        - name: tekmetric-dockerhub
      containers:
      - name: interview-ui
        image: tekmetric/interview-ui:latest
        imagePullPolicy: Always
        startupProbe:
          httpGet:
            path: /
            port: 3080
          failureThreshold: 6
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /metrics
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: interview-ui
spec:
  selector:
    app: interview-ui
  ports:
    - protocol: TCP
      port: 3000
  type: ClusterIP
