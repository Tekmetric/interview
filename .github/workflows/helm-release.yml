name: Helm Chart Validate

on:
  push:
    branches: [main, master]
    paths:
      - 'sre/helm/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'sre/helm/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16

      - name: Validate Chart Template
        run: |
          # Lint the chart for syntax errors
          helm lint sre/helm/interview-backend/
          
          # Dry-run render to verify templates work
          helm template test-release sre/helm/interview-backend/ --debug