---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-api
  labels:
    app: interview-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-api
  template:
    metadata:
      labels:
        app: interview-api
    spec:
      imagePullSecrets:
        - name: tekmetric-dockerhub
      containers:
      - name: interview-api
        image: tekmetric/interview-api:latest
        imagePullPolicy: Always
        env:
        - name: DATABASE_URL
          value: <SET_ME>
        - name: DATABASE_USER
          value: <SET_ME>
        - name: DATABASE_PASS
          value: <SET_ME>
        startupProbe:
          httpGet:
            path: /api/health/startup
            port: 8080
          failureThreshold: 12
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/welcome
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health/status
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: interview-api
spec:
  selector:
    app: interview-api
  ports:
    - protocol: TCP
      port: 8080
  type: NodePort
