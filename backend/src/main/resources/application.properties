spring.datasource.url=jdbc:h2:mem:testdb;MODE=LEGACY;NON_KEYWORDS=YEAR
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Use explicit SQL scripts instead of Hibernate DDL generation
spring.jpa.hibernate.ddl-auto=none
spring.datasource.schema=classpath:database/data.sql

# Application identity (used as a Prometheus label)
spring.application.name=interview-app

# Actuator / observability
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}