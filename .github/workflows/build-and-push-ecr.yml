name: Build and Push to ECR

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
  workflow_run:
    workflows: ["Trivy Code Scan"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      fail_on_vulnerabilities:
        description: 'Fail workflow when Critical/High vulnerabilities found'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: interview-backend
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_ARN: ${{ vars.ROLE_ARN }}

jobs:
  # Runs on pull_request events — builds and pushes a PR-scoped image to ECR
  build-push-pr:
    name: Build and Push PR Image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push PR image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image.outputs.uri }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=inline

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ steps.image.outputs.uri }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'json'
          output: 'trivy-container-results.json'

      - name: Report vulnerability count
        run: |
          VULN_COUNT=$(cat trivy-container-results.json | jq -r '[.Results[]?.Vulnerabilities[]?] | length' 2>/dev/null || echo "0")
          echo "Container scan: ${VULN_COUNT} CRITICAL/HIGH vulnerabilities found in ${{ steps.image.outputs.tag }}"

  # Runs after Trivy Code Scan completes on main/master, or on manual dispatch
  build-push-main:
    name: Build and Push Main Image
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image tag
        id: image
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "${SHA}" | cut -c1-7)
          DATE=$(date +%Y-%m-%d)
          TAG="${SHORT_SHA}-${DATE}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=inline

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ steps.image.outputs.uri }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'json'
          output: 'trivy-container-results.json'

      - name: Check for vulnerabilities and optionally fail
        run: |
          VULN_COUNT=$(cat trivy-container-results.json | jq -r '[.Results[]?.Vulnerabilities[]?] | length' 2>/dev/null || echo "0")
          FAIL_ON_VULNS="${{ github.event.inputs.fail_on_vulnerabilities || 'false' }}"
          echo "Container scan: ${VULN_COUNT} CRITICAL/HIGH vulnerabilities found in ${{ steps.image.outputs.tag }}"
          if [ "${VULN_COUNT}" -gt 0 ] && [ "${FAIL_ON_VULNS}" = "true" ]; then
            echo "Failing build due to vulnerabilities"
            exit 1
          fi
