---
# tekmetric backend
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekmetric-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hoppr-gg/interview
    targetRevision: feature/k8s-app-mod
    path: charts/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: tekmetric
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
