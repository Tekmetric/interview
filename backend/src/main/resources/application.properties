# In-memory H2 database used for the coding exercise.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Load schema/data from SQL scripts rather than Hibernate DDL generation.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
# Disable Open Session in View for a cleaner request boundary.
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# H2 browser console for local inspection.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
