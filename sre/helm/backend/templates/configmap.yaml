apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  application.properties: |
    # Server Configuration
    server.port={{ .Values.config.server.port | default 8080 }}

    # Database Configuration (H2 in-memory)
    spring.datasource.url=jdbc:h2:mem:testdb
    spring.datasource.driverClassName=org.h2.Driver
    spring.datasource.username=sa
    spring.datasource.password=password
    spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
    spring.h2.console.enabled=true

    # Actuator Configuration
    management.endpoints.web.exposure.include=health,info,prometheus,metrics
    management.endpoint.health.probes.enabled=true
    management.health.livenessState.enabled=true
    management.health.readinessState.enabled=true
    management.endpoint.health.show-details=always

    # Spring Profile
    spring.profiles.active={{ .Values.config.spring.profiles.active | default "default" }}

    # Logging
    logging.level.root={{ .Values.config.logging.level.root | default "INFO" }}
    logging.level.com.interview={{ .Values.config.logging.level | dig "com.interview" "DEBUG" }}
