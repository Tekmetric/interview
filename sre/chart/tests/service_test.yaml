suite: service
templates:
  - service.yaml
tests:
  - it: exposes app and management ports
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: management
            port: 8081
            targetPort: management
            protocol: TCP
