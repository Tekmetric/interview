replicaCount: 2

image:
  repository: ghcr.io/YOUR_GH_USER/YOUR_REPO/backend
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: [] # e.g. [{ secretName: backend-tls, hosts: [backend.local] }]

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Java 8 heap sizing for k8s limits (leave headroom for non-heap)
env:
  JAVA_TOOL_OPTIONS: "-Xms256m -Xmx350m -XX:+ExitOnOutOfMemoryError"

# Probes: if you add actuator, use /actuator/health/... paths.
# If not, you can temporarily set path: "/" and treat 200/404 carefully.
probes:
  liveness:
    enabled: true
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    enabled: true
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 5

pdb:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapePath: /actuator/prometheus

