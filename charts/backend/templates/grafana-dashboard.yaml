{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  backend-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_count{namespace=\"{{ .Values.namespace }}\", job=\"backend\"}[5m])",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}} {{`{{status}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "HTTP Request Duration (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace=\"{{ .Values.namespace }}\", job=\"backend\"}[5m]))",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "title": "JVM Heap Memory",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{namespace=\"{{ .Values.namespace }}\", job=\"backend\", area=\"heap\"}",
              "legendFormat": "{{`{{id}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "rate(process_cpu_usage{namespace=\"{{ .Values.namespace }}\", job=\"backend\"}[5m])",
              "legendFormat": "CPU"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          }
        },
        {
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"{{ .Values.namespace }}\", container=\"backend\"})",
              "legendFormat": "Restarts"
            }
          ]
        },
        {
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"{{ .Values.namespace }}\", phase=\"Running\", pod=~\"backend.*\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "title": "Health Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "up{namespace=\"{{ .Values.namespace }}\", job=\"backend\"}",
              "legendFormat": "Up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "DOWN" } }, "type": "value" },
                { "options": { "1": { "text": "UP" } }, "type": "value" }
              ]
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["backend", "spring-boot"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Backend Service",
      "uid": "tekmetric-backend"
    }
{{- end }}
