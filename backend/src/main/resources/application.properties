# Configure H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password


# Explicitly tells Hibernate (used by Spring Data JPA) to use the SQL dialect for the H2 database.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# Enable H2 Console
spring.h2.console.enabled=true
# Allow external access to H2 residing inside a docker container
spring.h2.console.settings.web-allow-others=true


# Log execution of data.sql for debug
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG


# Hibernate does not create or change tables, only checks if the schema matches the entities defined.
spring.jpa.hibernate.ddl-auto=validate


##################################################
##         Use resources/database/data.sql       #
##################################################
## Spring Boot to always run SQL init scripts (data.sql) on startup.
#spring.sql.init.mode=always
## Spring to look into resources/database/data.sql
#spring.sql.init.data-locations=classpath:database/data.sql


#################################################
#                Use flyway                     #
#################################################
# Spring Boot to never run SQL init scripts (data.sql) on startup.
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# Show the raw SQL that Hibernate executes.
spring.jpa.show-sql=true

# Customer last name count threshold
customer.threshold=3

# Enable Redis as the caching provider
spring.cache.type=redis

# Redis connection settings
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Docker default has no password
# spring.data.redis.password=password


logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.com.interview=DEBUG
