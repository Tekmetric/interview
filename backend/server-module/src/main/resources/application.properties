# --- H2 Database ---
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA Schema + SQL Init ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# pretty format
spring.jpa.properties.hibernate.format_sql=true

# schema.sql owns schema creation
spring.jpa.hibernate.ddl-auto=none

# Required for data.sql to load!
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show schema auto-ddl operations
spring.jpa.show-sql=false

# Expose actuator endpoints over HTTP
management.endpoints.web.exposure.include=health,info

# Helpful for debugging startup script execution
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.boot.sql.init=DEBUG

