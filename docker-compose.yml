
services:
  testdb:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: password
    ports:
      - 5432:5432
    volumes:
      - testdb:/var/lib/postgresql/data
      - ./src/main/resources/database:/docker-entrypoint-initdb.d

volumes:
  testdb:
