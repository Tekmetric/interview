demo.api-key=super-secret-demo-key

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Point to your ddl and dml in /resources/database
spring.datasource.schema=classpath:/database/schema.sql
spring.datasource.data=classpath:/database/data.sql
#disable JPA schema creation
spring.jpa.hibernate.ddl-auto=none
## Audit table properties
spring.jpa.properties.org.hibernate.envers.audit_table_prefix=audit_
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=
spring.jpa.properties.org.hibernate.envers.revision_field_name=revision_id
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revision_type_id

#use the custom logger to log api calls
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

#show the sql calls in the logs
spring.jpa.show-sql=false
