    #     type: kv-v2
    #     data:
    #       - secretKey: username
    #         remoteKey: username
    #       - secretKey: password
    #         remoteKey: password
    #     destination:

# Node selection - schedule pods on specific nodes (e.g., {"node-type": "compute"})
nodeSelector: {}

# Tolerations - allow scheduling on tainted nodes
tolerations: []

# Affinity rules - advanced pod placement (pod-to-pod, pod-to-node relationships)
affinity: {}
