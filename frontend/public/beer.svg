<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Mug outline -->
  <g filter="url(#shadow)">
    <rect x="48" y="64" width="128" height="144" rx="16" fill="url(#beerFill)" stroke="#1F2937" stroke-width="8"/>
    <!-- Handle -->
    <path d="M192 96h16c13.255 0 24 10.745 24 24v32c0 13.255-10.745 24-24 24h-16" fill="none" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>

    <!-- Foam top -->
    <path d="M56 72c0-13.255 10.745-24 24-24 6.627 0 12.627 2.686 17 7 4.373-4.314 10.373-7 17-7 8.837 0 16.5 4.703 20.857 11.74C140.4 56.56 146.86 52 154.5 52 166.926 52 177 62.074 177 74.5V80H56v-8z" fill="url(#foam)" stroke="#1F2937" stroke-width="8"/>

    <!-- Beer bubbles -->
    <circle cx="92" cy="120" r="6" fill="#FDE68A"/>
    <circle cx="132" cy="108" r="5" fill="#FDE68A"/>
    <circle cx="116" cy="144" r="4" fill="#FDE68A"/>
    <circle cx="148" cy="148" r="6" fill="#FDE68A"/>

    <!-- Glass highlights -->
    <rect x="60" y="84" width="8" height="108" rx="4" fill="#FFF" fill-opacity="0.5"/>
    <rect x="72" y="84" width="6" height="108" rx="3" fill="#FFF" fill-opacity="0.25"/>
  </g>

  <!-- Base shadow ellipse -->
  <ellipse cx="112" cy="214" rx="84" ry="10" fill="#000" opacity="0.08"/>
</svg>


