# ClusterSecretStore: ESO's reference to Vault. Cluster-scoped so any
# namespace can create ExternalSecrets that reference this store.
#
# Auth uses a static Vault token in a Secret. Bootstrap chicken-and-egg:
# the auth Secret itself has to come from somewhere. For this demo,
# `make vault-init` creates it from the Vault root token. In prod,
# the Secret should come from SealedSecrets or an IRSA-backed auth method.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
