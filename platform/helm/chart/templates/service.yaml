apiVersion: v1
kind: Service
metadata:
  {{- include "chart.metadata" . | nindent 2 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ include "chart.servicePort" . }}
      targetPort: http
      protocol: TCP
      name: http
  {{- include "chart.serviceSelector" . | nindent 2 }}
