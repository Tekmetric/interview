# Command Database (Write)
spring.datasource.command.url=jdbc:h2:mem:commanddb
spring.datasource.command.driver-class-name=org.h2.Driver
spring.datasource.command.username=sa
spring.datasource.command.password=password

# Query Database (Read)
spring.datasource.query.url=jdbc:h2:mem:querydb
spring.datasource.query.driver-class-name=org.h2.Driver
spring.datasource.query.username=sa
spring.datasource.query.password=password

# H2 Console
spring.h2.console.enabled=true

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Logging with Trace/Span IDs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [trace=%X{traceId}|span=%X{spanId}] %-5level %logger{36} - %msg%n
logging.level.com.interview=INFO

# Micrometer Tracing
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,info,metrics