<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <title>Interview App</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .shell-header {
        border-bottom: 1px solid #e5e5e5;
      }

      .shell-header-inner {
        max-width: 80rem;
        margin: 0 auto;
        padding: 1rem;
      }

      .shell-brand {
        font-size: 1.125rem;
        font-weight: 700;
        color: #171717;
      }

      .shell-header-desktop {
        display: none;
        grid-template-columns: 1fr 1fr 1fr;
        align-items: center;
        gap: 1rem;
      }

      .shell-header-mobile {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .shell-header-mobile-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 1rem;
      }

      .shell-search {
        display: flex;
        gap: 0.5rem;
        width: 100%;
        max-width: 28rem;
        justify-self: center;
      }

      .shell-main {
        flex: 1;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
      }

      .shell-layout {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .shell-sidebar {
        display: none;
        width: 14rem;
        flex-shrink: 0;
      }

      .shell-sidebar-title {
        margin: 0 0 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #171717;
      }

      .shell-radio-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.5rem;
      }

      .shell-radio-dot {
        width: 1rem;
        height: 1rem;
        border-radius: 9999px;
        flex-shrink: 0;
      }

      .shell-content {
        min-width: 0;
        flex: 1;
      }

      .shell-heading-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .shell-heading-group {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.5rem;
      }

      .shell-mobile-filter {
        display: block;
      }

      .shell-grid-area {
        min-height: 60vh;
        width: 100%;
        border: 1px solid #e5e5e5;
        border-radius: 0.25rem;
        background-color: #f5f5f5;
      }

      .shell-pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
      }

      .shell-block {
        border-radius: 0.25rem;
        background-color: #e5e5e5;
      }

      .shell-pulse {
        animation: shell-pulse 1.5s ease-in-out infinite;
      }

      @keyframes shell-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .shell-pulse {
          animation: none;
        }
      }

      @media (min-width: 768px) {
        .shell-header-desktop {
          display: grid;
        }

        .shell-header-mobile {
          display: none;
        }

        .shell-search {
          margin: 0 auto;
        }
      }

      @media (min-width: 1024px) {
        .shell-layout {
          flex-direction: row;
          align-items: flex-start;
        }

        .shell-sidebar {
          display: block;
        }

        .shell-mobile-filter {
          display: none;
        }
      }

      .shell-sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="app-shell" class="shell" aria-busy="true">
        <header class="shell-header">
          <div class="shell-header-inner">
            <div class="shell-header-desktop">
              <div class="shell-brand">Productpalooza</div>
              <div class="shell-search">
                <div
                  class="shell-block shell-pulse"
                  style="flex: 1; height: 2.375rem"
                ></div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 4.5rem; height: 2.375rem"
                ></div>
              </div>
              <div style="justify-self: end">
                <div
                  class="shell-block shell-pulse"
                  style="width: 6.5rem; height: 2.375rem"
                ></div>
              </div>
            </div>
            <div class="shell-header-mobile">
              <div class="shell-brand">Productpalooza</div>
              <div class="shell-header-mobile-row">
                <div class="shell-search">
                  <div
                    class="shell-block shell-pulse"
                    style="flex: 1; height: 2.375rem"
                  ></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 4.5rem; height: 2.375rem"
                  ></div>
                </div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 4rem; height: 2.375rem"
                ></div>
              </div>
            </div>
          </div>
        </header>

        <main class="shell-main">
          <div class="shell-layout">
            <aside class="shell-sidebar" aria-label="Product filters">
              <p class="shell-sidebar-title">Categories</p>
              <div role="status" aria-live="polite">
                <span class="shell-sr-only">Loading categories</span>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 6rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 7rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 5.5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 6.5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 4.5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 7.5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 5rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 6rem; height: 0.875rem"
                  ></div>
                </div>
                <div class="shell-radio-row">
                  <div class="shell-block shell-pulse shell-radio-dot"></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 5.25rem; height: 0.875rem"
                  ></div>
                </div>
              </div>
            </aside>

            <div class="shell-mobile-filter">
              <div
                class="shell-block shell-pulse"
                style="width: 9.5rem; height: 2.375rem"
              ></div>
            </div>

            <div class="shell-content">
              <div class="shell-heading-row">
                <div class="shell-heading-group">
                  <div
                    class="shell-block shell-pulse"
                    style="width: 7rem; height: 1.75rem"
                  ></div>
                  <div
                    class="shell-block shell-pulse"
                    style="width: 5rem; height: 0.875rem"
                  ></div>
                </div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 9rem; height: 2.375rem"
                ></div>
              </div>

              <div role="status" aria-live="polite">
                <span class="shell-sr-only">Loading products</span>
                <div class="shell-grid-area shell-block shell-pulse"></div>
              </div>

              <nav class="shell-pagination" aria-hidden="true">
                <div
                  class="shell-block shell-pulse"
                  style="width: 5.5rem; height: 2.375rem"
                ></div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 2.25rem; height: 2.375rem"
                ></div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 2.25rem; height: 2.375rem"
                ></div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 2.25rem; height: 2.375rem"
                ></div>
                <div
                  class="shell-block shell-pulse"
                  style="width: 4rem; height: 2.375rem"
                ></div>
              </nav>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
