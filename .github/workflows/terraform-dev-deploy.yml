name: Terraform Dev Deploy

# Triggers whenever ECR build/push or Helm validate completes on a PR.
# The gate job checks that ALL required workflows that ran for this SHA have
# passed before allowing the deploy to proceed. If a required workflow is
# still in progress, the gate exits silently — the next completion event
# will re-trigger this workflow and the gate will re-evaluate.
#
# Prerequisites:
#   - S3 bucket for Terraform state  (override: set repo variable TF_STATE_BUCKET)
#   - DynamoDB table for state locking (override: set repo variable TF_LOCKS_TABLE)
#   - GithubActionsRole must have permissions for: S3, DynamoDB, EKS, VPC, IAM, Route53, ACM

on:
  workflow_run:
    workflows: ["Build and Push to ECR", "Helm Chart Validate"]
    types: [completed]

jobs:
  gate:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    # Only deploy for PR-triggered workflow runs
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      actions: read
      pull-requests: read
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      head_sha: ${{ steps.check.outputs.head_sha }}

    steps:
      - name: Check all required workflows passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            core.setOutput('head_sha', headSha);

            // Find the open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              console.log(`No open PR found for branch: ${headBranch}`);
              core.setOutput('should_deploy', 'false');
              return;
            }

            const prNumber = prs[0].number;
            core.setOutput('pr_number', prNumber.toString());
            console.log(`PR #${prNumber} — SHA: ${headSha}`);

            // Workflows that must have succeeded (if they ran for this SHA)
            const requiredWorkflows = [
              { id: 'build-and-push-ecr.yml', name: 'Build and Push to ECR' },
              { id: 'helm-validate.yml',      name: 'Helm Chart Validate'   },
            ];

            for (const workflow of requiredWorkflows) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.id,
                head_sha: headSha,
                event: 'pull_request',
                per_page: 1,
              });

              if (runs.length === 0) {
                console.log(`${workflow.name}: did not run for this SHA — skipping`);
                continue;
              }

              const run = runs[0];
              console.log(`${workflow.name}: status=${run.status} conclusion=${run.conclusion}`);

              const inProgress = ['in_progress', 'queued', 'waiting', 'requested', 'pending'];
              if (inProgress.includes(run.status)) {
                console.log(`${workflow.name} still running — deferring deploy`);
                core.setOutput('should_deploy', 'false');
                return;
              }

              if (run.conclusion !== 'success') {
                core.setOutput('should_deploy', 'false');
                core.setFailed(`${workflow.name} did not succeed (conclusion: ${run.conclusion})`);
                return;
              }
            }

            core.setOutput('should_deploy', 'true');
            console.log('All required workflows passed — proceeding with deploy');

  deploy:
    name: Terraform Apply Dev
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        id: init
        working-directory: sre/terraform/envs/dev
        run: |
          # key is pre-configured in backend.tf (eks/dev/terraform.tfstate)
          # region comes from AWS_DEFAULT_REGION set by configure-aws-credentials
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCKS_TABLE }}"

      - name: Terraform Plan
        id: plan
        working-directory: sre/terraform/envs/dev
        run: terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan_output.txt
        continue-on-error: true

      - name: Terraform Apply
        id: apply
        if: steps.plan.outcome == 'success'
        working-directory: sre/terraform/envs/dev
        run: terraform apply -auto-approve -no-color tfplan 2>&1 | tee /tmp/apply_output.txt
        continue-on-error: true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const readFile = (path) => {
              try { return fs.readFileSync(path, 'utf8'); } catch { return 'Not available'; }
            };
            const truncate = (s, n) => s.length > n ? s.slice(0, n) + '\n...(truncated)' : s;

            const planOutput  = readFile('/tmp/plan_output.txt');
            const applyOutput = readFile('/tmp/apply_output.txt');
            const planOutcome  = '${{ steps.plan.outcome }}';
            const applyOutcome = '${{ steps.apply.outcome }}';

            const icon = applyOutcome === 'success' ? '✅'
              : (applyOutcome === 'failure' || planOutcome === 'failure') ? '❌' : '⚠️';

            let body = `## ${icon} Terraform Dev Deploy\n\n`;
            body += `**Commit:** \`${{ needs.gate.outputs.head_sha }}\`  \n`;
            body += `**Plan:** \`${planOutcome}\`  |  **Apply:** \`${applyOutcome || 'skipped'}\`\n\n`;
            body += `<details><summary>Plan Output</summary>\n\n\`\`\`hcl\n${truncate(planOutput, 30000)}\n\`\`\`\n</details>\n`;
            if (applyOutcome) {
              body += `\n<details><summary>Apply Output</summary>\n\n\`\`\`\n${truncate(applyOutput, 30000)}\n\`\`\`\n</details>`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ needs.gate.outputs.pr_number }}'),
              body,
            });
