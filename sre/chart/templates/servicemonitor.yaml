{{- if .Values.serviceMonitor.enabled -}}
# Prometheus Operator CRD. kube-prometheus-stack discovers ServiceMonitors
# cluster-wide (or per label) and generates scrape config automatically.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "tekmetric-backend.fullname" . }}
  labels:
    {{- include "tekmetric-backend.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "tekmetric-backend.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: management
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      # Rewrite the instance label to include pod name; default instance
      # is host:port which is useless for pod-level dashboards.
      # Prometheus Operator defaults action=replace on each relabeling
      # entry server-side, so we set it explicitly to keep Argo in sync.
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
{{- end }}
