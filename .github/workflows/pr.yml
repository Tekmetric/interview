# PR validation: lint, test, build, scan. Does NOT push images or
# mutate the repo. Runs on every pull request touching SRE paths.
name: SRE PR

on:
  pull_request:
    paths:
      - "sre/**"
      - "backend/**"
      - ".github/workflows/pr.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: sre-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sre/Dockerfile
          failure-threshold: warning

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint sre/chart --strict

      - name: Validate rendered manifests (kubeconform)
        run: |
          helm template tekmetric-backend sre/chart > /tmp/rendered.yaml
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /tmp kubeconform
          /tmp/kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml

  helm-unittest:
    name: Helm unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.2
      - name: Run unit tests
        run: helm unittest sre/chart

  build-and-scan:
    name: Build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build but don't push on PRs. The scan runs against the local image.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sre/Dockerfile
          push: false
          load: true
          tags: tekmetric-backend:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Non-blocking for demo (see ci.yml for rationale). In prod: exit-code "1".
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tekmetric-backend:pr-${{ github.event.pull_request.number }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
