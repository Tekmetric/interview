spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always

management.endpoints.web.exposure.include: health,info

springdoc:
  open-api:
    info:
      title: "Vehicles API Documentation"
      version: "1.0.0"
      description: "Vehicles API documentation for managing vehicle data."
