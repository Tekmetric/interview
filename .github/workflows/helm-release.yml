name: Helm Chart Release

on:
  push:
    branches:
      - main
    paths:
      - 'sre/helm/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16

      - name: Validate Chart Template
        run: |
          # Lint the chart for syntax errors
          helm lint sre/helm/interview-backend/
          
          # Dry-run render to verify templates work
          helm template test-release sre/helm/interview-backend/ --debug

      - name: Package Chart
        id: package
        run: |
          VERSION=$(grep '^version:' sre/helm/interview-backend/Chart.yaml | awk '{print $2}')
          echo "Chart version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          mkdir -p chart-repo
          helm package sre/helm/interview-backend --destination chart-repo/

      - name: Generate Index
        run: |
          cd chart-repo
          # Generate index.yaml with the base URL for GitHub Pages
          helm repo index . --url "https://${{ github.repository_owner }}.github.io/${{ github.repository }}/helm"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'chart-repo'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4