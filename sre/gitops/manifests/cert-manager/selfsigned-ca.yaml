# Self-signed CA chain for local demo. Root issuer signs a CA cert,
# which becomes the ClusterIssuer that signs all ingress certs.
# In prod, replace with a Let's Encrypt ClusterIssuer (DNS-01 or HTTP-01).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sre-demo-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: sre-demo-root-ca
  secretName: sre-demo-ca-key-pair
  duration: 8760h # 1 year for demo convenience
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-ca
spec:
  ca:
    secretName: sre-demo-ca-key-pair
