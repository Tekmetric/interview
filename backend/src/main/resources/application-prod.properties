spring.datasource.url=jdbc-secretsmanager:mysql://localhost:3306/interview?secretId=prod/db
spring.datasource.driverClassName=com.amazonaws.secretsmanager.sql.AwsSecretsManagerDriver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.h2.console.enabled=false
logging.level.root=INFO
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none

# HikariCP configuration for scaling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000