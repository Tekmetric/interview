apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "interview-backend.fullname" . }}-config
  labels:
    {{- include "interview-backend.labels" . | nindent 4 }}
data:
  application.properties: |
    server.port=8080
    spring.h2.console.enabled=true
    spring.h2.console.path=/h2-console