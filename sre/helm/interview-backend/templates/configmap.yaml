apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "interview-backend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "interview-backend.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}