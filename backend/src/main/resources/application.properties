# Datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL Initialization - replaces initialization-mode in Spring Boot 3.x
spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

# Logging
logging.level.root=INFO
logging.level.com.interview=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%thread] %-40.40logger{39} : %m%n

# Open API
springdoc.packagesToScan=com.interview
springdoc.pathsToMatch=/api/**
springdoc.paths-to-exclude=/api/welcome

# App
app.welcome.message=Welcome to the interview project!
app.api-key-header=X-API-Key