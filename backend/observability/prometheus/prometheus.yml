global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: interview-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
    # Attach a human-friendly label
    relabel_configs:
      - target_label: application
        replacement: interview-app
