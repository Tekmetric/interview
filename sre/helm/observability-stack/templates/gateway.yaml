{{- if .Values.grafana.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: observability-gateway
  namespace: istio-ingress
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
spec:
  selector:
    app: istio-ingress
    istio: ingress
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "grafana.local"
{{- end }}
