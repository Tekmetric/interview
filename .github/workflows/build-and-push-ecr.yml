name: Build and Push to ECR

on:
  workflow_run:
    workflows: [Trivy Code Scan]
    types: [completed]
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.outputs.is_pr == 'true' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: interview:build

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker://interview:build'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  build-push-and-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.outputs.is_pr == 'false' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::519551088082:role/GithubActionsRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: docker/login-action@v3
        with:
          registry: 519551088082.dkr.ecr.us-east-1.amazonaws.com
          username: AWS
          password: ${{ steps.login-ecr.outputs.aws-access-key-id }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: 519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:build
          cache-from: type=registry,ref=519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:latest

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker://519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:build'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: 519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:${{ steps.sha.outputs.short_sha }}-${{ steps.date.outputs.date }}
          cache-from: type=registry,ref=519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:latest
          cache-to: type=inline