name: Build and Push to ECR

on:
  workflow_run:
    workflows: [Trivy Code Scan]
    types: [completed]
    branches: [main, master]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      fail_on_vulnerabilities:
        description: 'Fail workflow when Critical/High vulnerabilities found'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.workflow_run.conclusion == '') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.outputs.is_pr == 'true')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: interview:build

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker://interview:build'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Check for vulnerabilities and optionally fail
        id: check_vulns
        run: |
          VULN_COUNT=$(docker run --rm aquasec/trivy:latest image --format json --severity CRITICAL,HIGH interview:build 2>/dev/null | jq -r '[.Results[]?.Vulnerabilities[]?] | length' 2>/dev/null || echo "0")
          echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          FAIL_ON_VULNS=${{ github.event.inputs.fail_on_vulnerabilities || 'false' }}
          
          if [ "$VULN_COUNT" -gt 0 ] && [ "$FAIL_ON_VULNS" = "true" ]; then
            echo "❌ Found $VULN_COUNT vulnerabilities. Failing build."
            exit 1
          else
            echo "✅ Scan complete. Found $VULN_COUNT vulnerabilities (fail_on_vulnerabilities=$FAIL_ON_VULNS)"
          fi

  build-push-and-scan:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.outputs.is_pr == 'false')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::519551088082:role/GithubActionsRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: docker/login-action@v3
        with:
          registry: 519551088082.dkr.ecr.us-east-1.amazonaws.com
          username: AWS
          password: ${{ steps.login-ecr.outputs.aws-access-key-id }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: 519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:build
          cache-from: type=registry,ref=519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:latest

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker://519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:build'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'json'
          output: 'trivy-container-results.json'

      - name: Check for vulnerabilities and optionally fail
        id: check_vulns
        run: |
          VULN_COUNT=$(cat trivy-container-results.json | jq -r '[.Results[]?.Vulnerabilities[]?] | length' 2>/dev/null || echo "0")
          echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          FAIL_ON_VULNS=${{ github.event.inputs.fail_on_vulnerabilities || 'false' }}
          
          if [ "$VULN_COUNT" -gt 0 ] && [ "$FAIL_ON_VULNS" = "true" ]; then
            echo "❌ Found $VULN_COUNT vulnerabilities. Failing build."
            exit 1
          else
            echo "✅ Scan complete. Found $VULN_COUNT vulnerabilities (fail_on_vulnerabilities=$FAIL_ON_VULNS)"
          fi

      - name: Push image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: 519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:${{ steps.sha.outputs.short_sha }}-${{ steps.date.outputs.date }}
          cache-from: type=registry,ref=519551088082.dkr.ecr.us-east-1.amazonaws.com/interview:latest
          cache-to: type=inline