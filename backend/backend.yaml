apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  selector:
    app: backend
  type: LoadBalancer
  ports:
    - port: 8090
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/gregops312/interview:pr-1
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /api/welcome
              port: liveness-port
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/welcome
              port: liveness-port
            failureThreshold: 1
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - jps
                - interview-1.0-SNAPSHOT.jar
            initialDelaySeconds: 5
            periodSeconds: 5
