spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql

management.endpoints.web.exposure.include=health,info

spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

spring.security.user.name=api-user
spring.security.user.password=changeme

aws.enabled=false

# Disable Spring Cloud AWS auto-configuration when aws.enabled=false.
# SqsAutoConfiguration runs unconditionally when the starter is on the classpath and will
# fail at startup without a region. Flip both flags together when enabling real AWS.
spring.cloud.aws.sqs.enabled=false

# Uncomment to enable real AWS integration (set aws.enabled=true and spring.cloud.aws.sqs.enabled=true):
# aws.region=us-east-1
# aws.sqs.queue-url=https://sqs.us-east-1.amazonaws.com/123456789/credit-applications
# aws.s3.bucket-name=dealership-documents