{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.denyEgress }}
    - Egress
    {{- end }}
  ingress:
    # Allow traffic on the application port
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
      {{- if .Values.networkPolicy.allowedCIDRs }}
      from:
        {{- range .Values.networkPolicy.allowedCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
    # Allow health checks from kubelet
    - ports:
        - protocol: TCP
          port: 8080
      from:
        - ipBlock:
            cidr: 0.0.0.0/0  # Kubelet health checks come from node IPs
  {{- if .Values.networkPolicy.denyEgress }}
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS (for external APIs if needed)
    - ports:
        - protocol: TCP
          port: 443
  {{- end }}
{{- end }}
