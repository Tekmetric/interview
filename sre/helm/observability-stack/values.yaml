namespace:
  labels:
    istio-injection: enabled

prometheus:
  enabled: true
  server:
    podAnnotations:
      sidecar.istio.io/inject: "true"
    retention: 15d
    persistentVolume:
      enabled: true
      size: 20Gi
    extraFlags:
      - web.enable-lifecycle
      - web.enable-remote-write-receiver
      - enable-feature=otlp-write-receiver
      - storage.tsdb.out_of_order_time_window=30m
    extraScrapeConfigs: |
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
    service:
      annotations: {}
  serverFiles:
    prometheus.yml:
      otlp:
        promote_resource_attributes:
          - service.instance.id
          - service.name
          - service.namespace
          - service.version
          - cloud.availability_zone
          - cloud.region
          - container.name
          - deployment.environment
          - deployment.environment.name
          - k8s.cluster.name
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.daemonset.name
          - k8s.deployment.name
          - k8s.job.name
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - telemetry.sdk.name
          - telemetry.sdk.language
          - telemetry.sdk.version
          - process.runtime.name
          - process.runtime.version
          - host.name
          - os.type
  alertmanager:
    enabled: true
    podAnnotations:
      sidecar.istio.io/inject: "true"
    persistence:
      enabled: true
      size: 2Gi
    service:
      annotations: {}
  # Disable sub-charts already provided by k8s-monitoring
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false

loki:
  enabled: true
  fullnameOverride: loki
  podAnnotations:
    sidecar.istio.io/inject: "true"
  service:
    annotations: {}
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

tempo:
  enabled: true
  fullnameOverride: tempo
  podAnnotations:
    sidecar.istio.io/inject: "true"
  tempo:
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
  persistence:
    enabled: true
    size: 10Gi

grafana:
  enabled: true
  fullnameOverride: grafana
  podAnnotations:
    sidecar.istio.io/inject: "true"
  adminPassword: admin
  service:
    type: LoadBalancer
    annotations: {}
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://observability-stack-prometheus-server:80
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
        - name: Tempo
          type: tempo
          url: http://tempo:3200
          access: proxy
        - name: Alertmanager
          type: alertmanager
          url: http://observability-stack-alertmanager:9093
          access: proxy
          jsonData:
            implementation: prometheus
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      prometheus-stats:
        gnetId: 2
        revision: 2
        datasource: Prometheus

k8s-monitoring:
  enabled: true
  cluster:
    name: minikube
  destinations:
    prometheus:
      type: prometheus
      url: http://observability-stack-prometheus-server:80/api/v1/write
    loki:
      type: loki
      url: http://loki:3100/loki/api/v1/push
    tempo:
      type: otlp
      url: http://tempo:4317
      protocol: grpc
  telemetryServices:
    kube-state-metrics:
      deploy: true
    node-exporter:
      deploy: true
    opencost:
      deploy: true
      metricsSource: prometheus
      opencost:
        prometheus:
          external:
            url: http://observability-stack-prometheus-server.observability-stack.svc.cluster.local
        exporter:
          defaultClusterId: minikube
  collectors:
    alloy-metrics:
      presets: [clustered, statefulset]
      extraConfig: |
        discovery.kubernetes "istiod_endpoints" {
          role = "endpoints"
          namespaces { names = ["istio-system"] }
        }

        discovery.relabel "istiod" {
          targets = discovery.kubernetes.istiod_endpoints.targets
          rule {
            source_labels = ["__meta_kubernetes_service_name", "__meta_kubernetes_endpoint_port_name"]
            action        = "keep"
            regex         = "istiod;http-monitoring"
          }
          rule { source_labels = ["__meta_kubernetes_namespace"] ; target_label = "namespace" }
          rule { source_labels = ["__meta_kubernetes_pod_name"]  ; target_label = "pod" }
        }

        prometheus.scrape "istiod" {
          targets        = discovery.relabel.istiod.output
          forward_to     = [prometheus.remote_write.prometheus.receiver]
          scrape_interval = "30s"
        }

        discovery.kubernetes "istio_pods" {
          role = "pod"
        }

        discovery.relabel "istio_envoy" {
          targets = discovery.kubernetes.istio_pods.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_sidecar_istio_io_status"]
            action        = "keep"
            regex         = ".+"
          }
          rule {
            source_labels = ["__address__"]
            regex         = "([^:]+)(?::\\d+)?"
            replacement   = "$1:15090"
            target_label  = "__address__"
          }
          rule { action = "labelmap" ; regex = "__meta_kubernetes_pod_label_(.+)" }
          rule { source_labels = ["__meta_kubernetes_namespace"] ; target_label = "namespace" }
          rule { source_labels = ["__meta_kubernetes_pod_name"]  ; target_label = "pod" }
        }

        prometheus.relabel "istio_envoy" {
          forward_to = [prometheus.remote_write.prometheus.receiver]
          rule {
            source_labels = ["__name__"]
            regex         = "istio_.*|envoy_.*|pilot_.*"
            action        = "keep"
          }
        }

        prometheus.scrape "istio_envoy" {
          targets         = discovery.relabel.istio_envoy.output
          forward_to      = [prometheus.relabel.istio_envoy.receiver]
          scrape_interval = "30s"
        }
    alloy-logs:
      presets: [daemonset, filesystem-log-reader]
  clusterMetrics:
    enabled: true
    collector: alloy-metrics
    destinations: [prometheus]
  hostMetrics:
    enabled: true
    collector: alloy-metrics
    destinations: [prometheus]
    linuxHosts:
      enabled: true
      metricsTuning:
        useIntegrationAllowList: true
  costMetrics:
    enabled: true
    collector: alloy-metrics
    destinations: [prometheus]
  clusterEvents:
    enabled: true
    collector: alloy-logs
    destinations: [loki]
  podLogsViaLoki:
    enabled: true
    collector: alloy-logs
    destinations: [loki]
    excludeNamespaces:
      - interview-backend
  applicationObservability:
    enabled: true
    collector: alloy-metrics
    destinations: [tempo]
    receivers:
      otlp:
        grpc:
          enabled: true
        http:
          enabled: true
