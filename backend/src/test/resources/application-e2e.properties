# E2E tests - override only test-specific settings
# Inherits h2.jdbc.options from main application.properties (includes MODE=LEGACY)
# Only override the database name for test isolation
h2.db.name=testdb_e2e

# Override JPA/logging settings for E2E tests
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Don't initialize database with data.sql for E2E tests
spring.sql.init.mode=never
spring.datasource.initialization-mode=never
spring.datasource.data=

# H2 Console (disabled for tests)
spring.h2.console.enabled=false
