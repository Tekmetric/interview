# Root "app of apps": a single Argo Application that manages all
# other Applications in gitops/apps/. Apply once after Argo is installed:
#   kubectl apply -n argocd -f gitops/bootstrap/root-app.yaml
# After that, every change in gitops/apps/ flows through git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # Finalizer ensures child resources are cleaned up when root app is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # PUBLIC_REPO_URL_AND_PATH: replace with the PR fork URL before demo.
    repoURL: https://github.com/SchloTech/interview.git
    targetRevision: HEAD
    path: sre/gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
