suite: networkpolicy
templates:
  - networkpolicy.yaml
tests:
  - it: renders by default with deny-all posture and scoped ingress
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress
      - lengthEqual:
          path: spec.ingress
          count: 2

  - it: only allows management port from the Prometheus namespace
    asserts:
      - equal:
          path: spec.ingress[1].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: monitoring
      - equal:
          path: spec.ingress[1].ports[0].port
          value: 8081

  - it: is omitted when disabled
    set:
      networkPolicy.enabled: false
    asserts:
      - hasDocuments:
          count: 0
