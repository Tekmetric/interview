# =============================================================================
# Infrastructure foundation: ECR repository + IAM roles
# =============================================================================
# This workflow manages semi-permanent infrastructure resources.
# Run once to create ECR and IAM roles, rarely need to destroy.
#
# Triggers:
#   - Manual trigger only (workflow_dispatch)
#
# Actions:
#   - plan: Preview changes
#   - apply: Create/update resources
#   - destroy: Remove all resources (use with caution)
# =============================================================================

name: Infra - foundation
run-name: "Infra - foundation: ${{ github.event.inputs.action }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      auto_approve:
        description: 'Auto-approve apply/destroy (skip confirmation)'
        required: false
        default: 'false'
        type: boolean

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: '1.7.0'
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra
  cancel-in-progress: false  # Never cancel infra workflows

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sre/terraform/environments/dev/foundation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          terraform plan \
            -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          if [ "${{ github.event.inputs.auto_approve }}" == "true" ]; then
            terraform apply -auto-approve tfplan
          else
            terraform apply tfplan
          fi

      - name: Terraform Plan Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform plan \
            -destroy \
            -out=tfplan-destroy

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.auto_approve }}" == "true" ]; then
            terraform apply -auto-approve tfplan-destroy
          else
            echo "::warning::Destroy requires manual approval. Run with auto_approve=true to proceed."
            echo "Review the plan above and re-run with auto_approve if you want to destroy."
            exit 1
          fi

