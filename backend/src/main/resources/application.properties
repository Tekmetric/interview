# Configure H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver

spring.datasource.username=sa
spring.datasource.password=password

# Explicitly tells Hibernate (used by Spring Data JPA) to use the SQL dialect for the H2 database.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true

# Log execution of data.sql for debug
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG

# Rely on data.sql to create database, do not
spring.jpa.hibernate.ddl-auto=none
# Tells Spring Boot to always run SQL init scripts on startup.
spring.sql.init.mode=always
# Tells Spring to look in your subdirectory (resources/database/data.sql
spring.sql.init.data-locations=classpath:database/data.sql


# Show the raw SQL that Hibernate executes.
spring.jpa.show-sql=true


customer.threshold=3
