suite: hpa and pdb
templates:
  - hpa.yaml
  - pdb.yaml
tests:
  - it: renders HPA by default
    template: hpa.yaml
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 6

  - it: omits HPA when autoscaling disabled
    template: hpa.yaml
    set:
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PDB with minAvailable
    template: pdb.yaml
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
