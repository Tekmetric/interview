# H2 Database Configuration
# Common JDBC options applied to all environments (dev, test, e2e)
h2.jdbc.options=MODE=LEGACY;DB_CLOSE_DELAY=-1
h2.db.name=testdb

# JDBC Configuration
spring.datasource.url=jdbc:h2:mem:${h2.db.name};${h2.jdbc.options}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.data=classpath:database/data.sql
spring.datasource.initialization-mode=always

# H2 Console
spring.h2.console.enabled=true

# Logging
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO