# Configure H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password



# Explicitly tells Hibernate (used by Spring Data JPA) to use the SQL dialect for the H2 database.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect



# Enable H2 Console
spring.h2.console.enabled=true
# Allow external access to H2 residing inside a docker container
spring.h2.console.settings.web-allow-others=true



# Log execution of data.sql for debug
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=DEBUG



# Hibernate does not create or change tables, only checks if the schema matches the entities defined.
spring.jpa.hibernate.ddl-auto=validate



##################################################
##         Use resources/database/data.sql       #
##################################################
## Spring Boot to always run SQL init scripts (data.sql) on startup.
#spring.sql.init.mode=always
## Spring to look into resources/database/data.sql
#spring.sql.init.data-locations=classpath:database/data.sql



#################################################
#                Use flyway                     #
#################################################
# Spring Boot to never run SQL init scripts (data.sql) on startup.
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration



# Show the raw SQL that Hibernate executes.
spring.jpa.show-sql=true



# Customer last name count threshold
customer.threshold=3



# Enable Redis as the caching provider
spring.cache.type=redis
# Redis connection settings
spring.data.redis.host=localhost
spring.data.redis.port=6379
# redis docker default has no password
# spring.data.redis.password=password



# HMAC key used to sign JWT
# Generated by: openssl rand -base64 64 (rand = random, -base64 = encoded by base 64, 64 = length of the key)
jwt.hmacKey=EI3wHGsZ9dsw8Ty7AydFmT50WZzORDgZ/fOip0woMQNffJ9swjiEKtBGry3V9UWh2BMabS+RrbH6+1cxBsEHOg==
# JWT access token expiration time in seconds (86400 = 24 hours)
jwt.accessTokenExpiration=60
# JWT refresh token expiration time in seconds (86400 = 24 hours)
jwt.refreshTokenExpiration=120



# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Custom RabbitMQ properties
app.rabbitmq.queue.customer-email=customer.email.queue
app.rabbitmq.exchange.customer=customer.exchange
app.rabbitmq.routing-key.email=customer.email



# Debug
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.com.interview=DEBUG
