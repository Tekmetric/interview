spring:
  application:
    name: interview-app
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT secret key (hex-encoded) for signing and verifying JWT tokens. In a production environment, this should be stored securely and not hard-coded.
jwt:
  secret: 4a6f686e446f654a57545365637265744b6579466f72496e746572766965774170706c69636174696f6e32303236

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [requestId=%X{requestId:-} traceId=%X{traceId:-} spanId=%X{spanId:-} logLevel=%-5level loggerName=%logger{36}] - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        step: 10s
        aggregation-temporality: cumulative

pyroscope:
  agent:
    enabled: true
    server-address: http://localhost:4040
    application-name: interview-app

