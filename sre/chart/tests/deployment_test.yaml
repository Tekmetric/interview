suite: deployment
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: renders a Deployment with expected name and replicas
    template: deployment.yaml
    set:
      autoscaling.enabled: false
      replicaCount: 4
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-tekmetric-backend
      - equal:
          path: spec.replicas
          value: 4

  - it: omits replicas when autoscaling is enabled
    template: deployment.yaml
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: runs as non-root with dropped capabilities
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: defines all three probes against the management port
    template: deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: management
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: management
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: management

  - it: has preStop sleep for graceful LB drain
    template: deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].lifecycle.preStop

  - it: sets resource requests and limits
    template: deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.cpu
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.memory
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits.cpu
      - isNotNull:
          path: spec.template.spec.containers[0].resources.limits.memory

  - it: wires envFrom to the ConfigMap and (when enabled) the Secret
    template: deployment.yaml
    set:
      externalSecrets.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-tekmetric-backend-env
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-tekmetric-backend-secrets
