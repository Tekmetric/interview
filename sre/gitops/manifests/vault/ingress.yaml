# Vault UI ingress. Managed by Argo via the vault-ingress Application
# so it syncs after the Vault chart creates the namespace and service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ui
  namespace: vault
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-ca
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: vault-tls
      hosts:
        - vault.sre-demo.local
  rules:
    - host: vault.sre-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
