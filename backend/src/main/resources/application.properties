# Uses an in-memory H2 database for local runs and tests.
spring.datasource.url=jdbc:h2:mem:testdb
# Loads the H2 JDBC driver for the datasource.
spring.datasource.driverClassName=org.h2.Driver
# Sets the local H2 username.
spring.datasource.username=sa
# Sets the local H2 password.
spring.datasource.password=password
# Enables the browser-based H2 console for local debugging.
spring.h2.console.enabled=true
# Prevents Hibernate from creating or updating tables so SQL scripts own the schema.
spring.jpa.hibernate.ddl-auto=none
# Prevents lazy database access from leaking into controller/serialization work.
spring.jpa.open-in-view=false
# Runs SQL initialization before JPA starts using the datasource.
spring.jpa.defer-datasource-initialization=false
# Always runs configured SQL initialization scripts for this in-memory database.
spring.sql.init.mode=always
# Points Spring to the schema and seed data script.
spring.sql.init.schema-locations=classpath:database/data.sql
# Fails startup if any SQL initialization statement fails.
spring.sql.init.continue-on-error=false
# Serves the generated OpenAPI JSON document at this path.
springdoc.api-docs.path=/v3/api-docs
# Serves the Swagger UI page at this path.
springdoc.swagger-ui.path=/swagger-ui.html
