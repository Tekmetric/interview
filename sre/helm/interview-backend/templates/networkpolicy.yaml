{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "interview-backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "interview-backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "interview-backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only on the application port
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution (kube-dns / CoreDNS)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to AWS service endpoints (Secrets Manager, STS, etc.)
    - ports:
        - port: 443
          protocol: TCP
    # Allow OTLP traffic to OpenTelemetry Collector
    - ports:
        - port: 4317
          protocol: TCP
      {{- with .Values.networkPolicy.egress }}
        {{- toYaml . | nindent 4 }}
      {{- end }}
{{- end }}