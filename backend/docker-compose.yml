version: "3.9"

networks:
  observability:
    driver: bridge

services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: carshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.7
    container_name: carshop-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: carshop-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
