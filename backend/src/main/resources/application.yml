spring:
  application:
    name: tekmetric-interview
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:testdb;MODE=LEGACY;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
    hikari:
      pool-name: tekmetric-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 2000
      idle-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false
  sql:
    init:
      mode: always
      data-locations: classpath:database/data.sql
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  web:
    resources:
      add-mappings: true
server:
  port: 8080
  shutdown: graceful

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: readinessState,db
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
