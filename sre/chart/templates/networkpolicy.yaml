{{- if .Values.networkPolicy.enabled -}}
# Default-deny posture for this app. Explicit ingress rules below; egress
# allowed for DNS and anything else the app needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tekmetric-backend.fullname" . }}
  labels:
    {{- include "tekmetric-backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tekmetric-backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # App port 8080: only the ingress controller namespace may reach it.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.appPort }}
    # Management port 8081: only Prometheus in the monitoring namespace.
    # Keeps actuator endpoints (including /prometheus) off the public surface.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.managementPort }}
  egress:
    # Kubernetes DNS. Matches kube-system coredns pods by namespace label.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS egress for external dependencies (Vault, upstream APIs).
    # Broaden or tighten per environment.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
