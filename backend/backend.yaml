apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      annotations:
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/gregops312/interview:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          startupProbe:
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 1
            tcpSocket:
              port: 8080
          livenessProbe:
            httpGet:
              path: /api/welcome
              port: 8080
            failureThreshold: 1
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  selector:
    app: backend
  type: LoadBalancer
  ports:
    - name: http-traffic
      protocol: TCP
      port: 8080
      targetPort: 8080
