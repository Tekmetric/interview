spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:database/schema.sql
spring.sql.init.data-locations=classpath:database/data.sql
spring.mvc.problemdetail.enabled=true
spring.security.filter.dispatcher-types=REQUEST,ASYNC,ERROR
# pooled-lo uses the next sequence as the lower bound, which to me is more intuitive
spring.jpa.properties.hibernate.id.optimizer.pooled.preferred=pooled-lo
app.security.jwt.secret=ThisIsADemoJwtSecretKeyForInterviewProjectNeedsToBeLongEnough12345
app.security.jwt.access-token-ttl=PT15M
