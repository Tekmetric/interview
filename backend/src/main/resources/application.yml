spring:
  datasource:
    driverClassName: org.h2.Driver
    password: password
    url: jdbc:h2:mem:testdb
    username: sa
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    mode: always
    show-sql: true
    properties:
      hibernate:
        ordered_inserts: true
        ordered_updates: true
        jdbc:
          batch_size: 50
        format_sql: true
  h2:
    console:
      enabled: true
management:
    endpoints:
      web:
        exposure:
          include: "health,metrics"