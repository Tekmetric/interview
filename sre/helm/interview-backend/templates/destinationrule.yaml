apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "interview-backend.fullname" . }}
  namespace: {{ include "interview-backend.namespaceName" . }}
  labels:
    {{- include "interview-backend.labels" . | nindent 4 }}
spec:
  host: {{ include "interview-backend.fullname" . }}
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "interview-backend.fullname" . }}-tempo
  namespace: {{ include "interview-backend.namespaceName" . }}
  labels:
    {{- include "interview-backend.labels" . | nindent 4 }}
spec:
  host: tempo.observability-stack.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
