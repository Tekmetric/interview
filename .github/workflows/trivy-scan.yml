name: Trivy Code Scan

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      fail_on_vulnerabilities:
        description: 'Fail workflow when Critical/High vulnerabilities found'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Format results for summary
        id: summary
        run: |
          if [ -s trivy-results.json ]; then
            echo 'trivy_results=true' >> $GITHUB_OUTPUT
            echo "## 🔒 Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-results.json | jq -r '.Results[] | "\(.Target): \(.Vulnerabilities | length) vulnerabilities"' 2>/dev/null || echo "Unable to parse results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo 'trivy_results=false' >> $GITHUB_OUTPUT
            echo "## ✅ Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No critical or high vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔒 Trivy Scan Results\n\n';
            
            try {
              const results = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
              const vulnerabilities = results.Results?.reduce((acc, r) => acc + (r.Vulnerabilities?.length || 0), 0) || 0;
              
              if (vulnerabilities > 0) {
                body += `⚠️ Found **${vulnerabilities}** critical/high vulnerabilities:\n\n`;
                body += '| Target | Vulnerabilities |\n';
                body += '|--------|-----------------|\n';
                for (const result of results.Results || []) {
                  const count = result.Vulnerabilities?.length || 0;
                  if (count > 0) {
                    body += `| ${result.Target} | ${count} |\n`;
                  }
                }
              } else {
                body += '✅ No critical or high vulnerabilities found.\n';
              }
            } catch (e) {
              body += 'Unable to parse scan results.\n';
            }
            
            body += '\n<details><summary>Details</summary>\n\n';
            body += 'See [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for full results.\n';
            body += '</details>';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Check for vulnerabilities and optionally fail
        id: check_vulns
        run: |
          VULN_COUNT=$(cat trivy-results.json | jq -r '[.Results[]?.Vulnerabilities[]?] | length' 2>/dev/null || echo "0")
          echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          # Determine if we should fail
          FAIL_ON_VULNS=${{ github.event.inputs.fail_on_vulnerabilities || 'true' }}
          
          if [ "$VULN_COUNT" -gt 0 ] && [ "$FAIL_ON_VULNS" = "true" ]; then
            echo "❌ Found $VULN_COUNT vulnerabilities. Failing build."
            exit 1
          else
            echo "✅ Scan complete. Found $VULN_COUNT vulnerabilities (fail_on_vulnerabilities=$FAIL_ON_VULNS)"
          fi

      - name: Set outputs
        id: outputs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi