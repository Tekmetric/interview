# Test profile configuration
# Disable SQL data initialization for tests since tests manage their own data
spring.sql.init.mode=never

# Auto-generate schema from JPA entities for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Use single database for both command and query in tests (simplifies testing)
spring.datasource.command.url=jdbc:h2:mem:testdb
spring.datasource.command.driver-class-name=org.h2.Driver
spring.datasource.command.username=sa
spring.datasource.command.password=password

spring.datasource.query.url=jdbc:h2:mem:testdb
spring.datasource.query.driver-class-name=org.h2.Driver
spring.datasource.query.username=sa
spring.datasource.query.password=password
