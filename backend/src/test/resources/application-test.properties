# Repository tests - override only test-specific settings
# Inherits h2.jdbc.options from main application.properties (includes MODE=LEGACY)
# Only override the database name for test isolation
h2.db.name=testdb_repository

# Override JPA settings for tests
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Don't initialize database with data.sql for unit tests
spring.sql.init.mode=never
spring.datasource.initialization-mode=never
spring.datasource.data=
